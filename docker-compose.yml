services:
  product-db:
    build: ./productdb
    container_name: product-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=products_db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  product-api:
    build: ./productapi
    container_name: product-api
    ports:
      - "8081:8081"
    environment:
      - env=docker
    volumes:
      - ./productapi/configs:/configs
    depends_on:
      product-db:
       condition: service_healthy

volumes:
  db_data: